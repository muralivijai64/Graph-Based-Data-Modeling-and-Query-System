<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GraphMind — AI Query System</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c10;
      --panel:   #0f1318;
      --border:  #1e2530;
      --accent:  #00e5ff;
      --accent2: #7c3aed;
      --text:    #c9d6e3;
      --muted:   #4a5568;
      --green:   #10b981;
      --red:     #ef4444;
      --mono:    'Space Mono', monospace;
      --sans:    'Syne', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    #app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── TOP BAR ── */
    #topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,12,16,0.9);
      backdrop-filter: blur(12px);
    }
    .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: #fff; }
    .logo span { color: var(--accent); }
    .topbar-tag {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .topbar-status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── LEFT PANEL ── */
    #left {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--panel);
    }

    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-family: var(--mono); color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-header .dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }

    /* ── QUERY INPUT ── */
    #query-area { padding: 16px; border-bottom: 1px solid var(--border); }

    .input-wrap {
      position: relative; display: flex; align-items: flex-end; gap: 0;
      background: #0a0c10; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,229,255,0.08); }

    #query {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 12px 14px; font-family: var(--mono); font-size: 12px; color: #fff;
      resize: none; min-height: 44px; max-height: 100px; line-height: 1.5;
    }
    #query::placeholder { color: var(--muted); }

    #ask-btn {
      background: var(--accent); border: none; cursor: pointer;
      padding: 12px 16px; color: #000; font-family: var(--sans);
      font-weight: 700; font-size: 12px; letter-spacing: 0.5px;
      transition: background 0.15s, transform 0.1s; align-self: stretch;
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    #ask-btn:hover { background: #33ecff; }
    #ask-btn:active { transform: scale(0.97); }
    #ask-btn.loading { background: var(--muted); cursor: not-allowed; pointer-events: none; }

    .spin { width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    #ask-btn.loading .spin { display: block; }
    #ask-btn.loading .btn-arrow { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chips { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; line-height: 1.3;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── RESULTS ── */
    #results {
      flex: 1; overflow-y: auto; padding: 0 0 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    #empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 200px; gap: 12px;
    }
    .empty-icon { font-size: 28px; color: var(--muted); }
    .empty-text { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; line-height: 1.8; }

    .result-block { border-bottom: 1px solid var(--border); }
    .result-block.collapsed .result-block-body { display: none; }
    .result-block.collapsed .collapse-arrow { transform: rotate(-90deg); }

    .result-block-header {
      padding: 10px 20px; display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); cursor: pointer;
      transition: background 0.15s;
    }
    .result-block-header:hover { background: rgba(255,255,255,0.02); }
    .collapse-arrow { margin-left: auto; transition: transform 0.2s; font-size: 12px; }
    .result-block-body { padding: 0 20px 14px; }

    .label-icon {
      width: 20px; height: 20px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700;
    }
    .icon-sql    { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
    .icon-result { background: rgba(0,229,255,0.1);  color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }
    .icon-answer { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }

    .code-block {
      font-family: var(--mono); font-size: 11px; line-height: 1.7;
      background: #070910; border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 14px; overflow-x: auto; white-space: pre;
    }
    .kw { color: #a78bfa; font-weight: 700; }

    .result-table {
      width: 100%; border-collapse: collapse;
      font-family: var(--mono); font-size: 11px; margin-top: 4px;
    }
    .result-table th {
      text-align: left; padding: 6px 10px;
      background: rgba(0,229,255,0.05); color: var(--accent);
      border-bottom: 1px solid var(--border); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .result-table td { padding: 5px 10px; border-bottom: 1px solid rgba(30,37,48,0.6); color: var(--text); }
    .result-table tr:hover td { background: rgba(255,255,255,0.02); }
    .row-count { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 6px; }

    .answer-text { font-family: var(--mono); font-size: 12px; line-height: 1.7; color: #e2e8f0; }
    .answer-text.error { color: var(--red); }

    .fade-up { animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── RIGHT PANEL ── */
    #right { position: relative; display: flex; flex-direction: column; overflow: hidden; }

    #right-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: rgba(10,12,16,0.8); backdrop-filter: blur(8px);
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      flex-shrink: 0;
    }
    .panel-label { color: var(--accent); font-weight: 700; }
    .graph-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);
    }
    .badge-nodes { color: #93c5fd; border-color: rgba(147,197,253,0.2); background: rgba(147,197,253,0.05); }
    .badge-edges { color: #86efac; border-color: rgba(134,239,172,0.2); background: rgba(134,239,172,0.05); }

    #graph-box { flex: 1; position: relative; overflow: hidden; }
    .graph-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(30,37,48,0.4) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(30,37,48,0.4) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }

    #graphFrame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; background: transparent;
    }

    #graph-legend {
      position: absolute; bottom: 16px; right: 16px;
      background: rgba(15,19,24,0.9); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
      backdrop-filter: blur(8px);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; color: white; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a2030; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 20px; font-family: var(--mono); font-size: 12px; color: var(--text);
      opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 999; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="logo">Graph<span>Mind</span></div>
    <span class="topbar-tag">AI · Graph · Query</span>
    <div class="topbar-status">
      <div class="pulse" id="pulse-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </header>

  <!-- LEFT PANEL -->
  <aside id="left">
    <div class="panel-header">
      <div class="dot"></div>
      Query Interface
    </div>

    <div id="query-area">
      <div class="input-wrap">
        <textarea id="query" rows="1" placeholder="Ask about orders, deliveries, billing…"></textarea>
        <button id="ask-btn" onclick="ask()">
          <div class="spin"></div>
          <span class="btn-arrow">↵ Run</span>
        </button>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <div id="results">
      <div id="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Ask a question to query<br/>the knowledge graph</div>
      </div>
    </div>
  </aside>

  <!-- RIGHT PANEL -->
  <main id="right">
    <div id="right-header">
      <span class="panel-label">◈ Knowledge Graph</span>
      <span class="graph-badge badge-nodes" id="badge-nodes">— nodes</span>
      <span class="graph-badge badge-edges" id="badge-edges">— edges</span>
    </div>
    <div id="graph-box">
      <div class="graph-grid"></div>
      <!-- Graph is served directly from the FastAPI backend -->
      <iframe id="graphFrame" src="http://127.0.0.1:8000/graph.html"></iframe>
      <div id="graph-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#6a1b9a"></div>Customer</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div>Order</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>Product</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e65100"></div>Delivery</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c62828"></div>Billing</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00695c"></div>Journal</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffffff;border:2px solid #7f1d1d"></div>Result</div>
      </div>
    </div>
  </main>

</div>

<div id="toast"></div>

<script>
  const API = "http://127.0.0.1:8000";

  // ── Check backend on load ──
  async function checkBackend() {
    try {
      const r = await fetch(`${API}/`);
      const d = await r.json();
      setStatus("Backend connected", true);
      if (!d.db) setStatus("⚠ DB not found — run setup_db.py", false);
      loadGraphStats();
    } catch {
      setStatus("Backend unreachable", false);
    }
  }

  function setStatus(msg, ok) {
    document.getElementById("status-text").textContent = msg;
    document.getElementById("pulse-dot").style.background = ok ? "var(--green)" : "var(--red)";
    document.getElementById("pulse-dot").style.boxShadow  = ok ? "0 0 8px var(--green)" : "0 0 8px var(--red)";
  }

  async function loadGraphStats() {
    try {
      const r = await fetch(`${API}/graph`);
      const d = await r.json();
      document.getElementById("badge-nodes").textContent = `${d.nodes} nodes`;
      document.getElementById("badge-edges").textContent = `${d.edges} edges`;
    } catch {}
  }

  // ── Example queries ──
  const examples = [
    "Which products have the most billing docs?",
    "Trace the full flow of order 740545",
    "Orders delivered but not billed",
    "Top 5 customers by total order amount",
    "List cancelled billing documents",
    "Orders with no delivery",
    "Show all journal entries for billing document 90504248",
  ];

  const chipsEl = document.getElementById("chips");
  examples.forEach(ex => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.textContent = ex;
    chip.onclick = () => { document.getElementById("query").value = ex; ask(); };
    chipsEl.appendChild(chip);
  });

  // ── Auto-resize textarea ──
  const queryEl = document.getElementById("query");
  queryEl.addEventListener("input", () => {
    queryEl.style.height = "auto";
    queryEl.style.height = Math.min(queryEl.scrollHeight, 100) + "px";
  });
  queryEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
  });

  // ── Toast ──
  function toast(msg, isError = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "show" + (isError ? " error" : "");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ""; }, 3000);
  }

  // ── SQL highlight ──
  function highlightSQL(sql) {
    const kws = ["SELECT","FROM","WHERE","JOIN","LEFT","INNER","OUTER","ON","ORDER","BY",
      "GROUP","LIMIT","HAVING","AND","OR","NOT","AS","DISTINCT","COUNT","SUM","AVG",
      "MAX","MIN","IN","IS","NULL","DESC","ASC","WITH","UNION","INSERT","UPDATE",
      "DELETE","CREATE","DROP","CASE","WHEN","THEN","ELSE","END","COALESCE"];
    let safe = sql.replace(/</g,"&lt;").replace(/>/g,"&gt;");
    kws.forEach(kw => {
      safe = safe.replace(new RegExp(`\\b${kw}\\b`, "g"), `<span class="kw">${kw}</span>`);
    });
    return safe;
  }

  // ── Render table ──
  function renderTable(rows) {
    if (!rows || rows.length === 0) return '<div class="row-count">No rows returned</div>';
    const colCount = Array.isArray(rows[0]) ? rows[0].length : 1;
    let html = '<div style="overflow-x:auto"><table class="result-table"><thead><tr>';
    for (let i = 0; i < colCount; i++) html += `<th>col_${i+1}</th>`;
    html += '</tr></thead><tbody>';
    const limit = Math.min(rows.length, 20);
    rows.slice(0, limit).forEach(row => {
      const cells = Array.isArray(row) ? row : [row];
      html += '<tr>' + cells.map(c => `<td>${c ?? 'NULL'}</td>`).join('') + '</tr>';
    });
    html += `</tbody></table></div>`;
    if (rows.length > 20) html += `<div class="row-count">Showing 20 of ${rows.length} rows</div>`;
    else html += `<div class="row-count">${rows.length} row${rows.length!==1?'s':''}</div>`;
    return html;
  }

  // ── Build collapsible block ──
  function makeBlock(icon, iconClass, label, bodyHTML) {
    const block = document.createElement("div");
    block.className = "result-block fade-up";
    block.innerHTML = `
      <div class="result-block-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="label-icon ${iconClass}">${icon}</div>
        ${label}
        <span class="collapse-arrow">▾</span>
      </div>
      <div class="result-block-body">${bodyHTML}</div>
    `;
    return block;
  }

  // ── Main query function ──
  async function ask() {
    const q = queryEl.value.trim();
    if (!q) return;

    const btn = document.getElementById("ask-btn");
    btn.classList.add("loading");
    setStatus("Processing query…", true);

    const resultsEl = document.getElementById("results");
    document.getElementById("empty-state")?.remove();

    // Query label
    const sep = document.createElement("div");
    sep.style.cssText = "padding:12px 20px 4px;font-family:var(--mono);font-size:10px;color:var(--muted);border-top:1px solid var(--border);margin-top:4px;";
    sep.textContent = `▸ ${q}`;
    resultsEl.appendChild(sep);

    try {
      const res  = await fetch(`${API}/query?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (data.answer && data.answer.includes("designed to answer questions")) {
        // Guardrail response
        resultsEl.appendChild(makeBlock("!", "icon-answer", "Guardrail",
          `<div class="answer-text error">${data.answer}</div>`));
      } else {
        // SQL block
        if (data.sql) {
          resultsEl.appendChild(makeBlock("SQL", "icon-sql", "Generated SQL",
            `<div class="code-block">${highlightSQL(data.sql)}</div>`));
        }
        // Error block
        if (data.error) {
          resultsEl.appendChild(makeBlock("✕", "icon-result", "SQL Error",
            `<div class="answer-text error">${data.error}</div>`));
        }
        // Result table
        if (data.result !== undefined) {
          const rows = Array.isArray(data.result) ? data.result : [];
          resultsEl.appendChild(makeBlock("⊞", "icon-result", `Result — ${rows.length} row${rows.length!==1?'s':''}`,
            renderTable(rows)));
        }
        // Answer block
        if (data.answer) {
          // Render comma-separated IDs as badge pills
          const values = data.answer.split(", ").map(v => v.trim()).filter(Boolean);
          let answerHTML;
          if (values.length > 1 && !data.answer.startsWith("There are") && !data.answer.startsWith("Found") && !data.answer.startsWith("Result:")) {
            answerHTML =
              `<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">` +
              values.map(v =>
                `<span style="font-family:var(--mono);font-size:11px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.25);color:var(--accent);padding:3px 10px;border-radius:4px;">${v}</span>`
              ).join("") +
              `</div><div class="row-count" style="margin-top:6px">${values.length} result${values.length!==1?'s':''}</div>`;
          } else {
            // Parse **bold** markdown
            const rendered = data.answer.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff">$1</strong>');
            answerHTML = `<div class="answer-text">${rendered}</div>`;
          }
          resultsEl.appendChild(makeBlock("✦", "icon-answer", "Answer", answerHTML));
        }
        // Highlighted node count
        if (data.highlighted_nodes > 0) {
          toast(`Graph updated — ${data.highlighted_nodes} node${data.highlighted_nodes!==1?'s':''} highlighted`);
          // Reload iframe to show highlights
          const frame = document.getElementById("graphFrame");
          frame.src = `${API}/graph.html?t=${Date.now()}`;
        }
      }

      setStatus("Query complete", true);
    } catch (err) {
      resultsEl.appendChild(makeBlock("!", "icon-answer", "Connection Error",
        `<div class="answer-text error">Cannot connect to backend at ${API}<br><br>Make sure you ran: <code>uvicorn main:app --reload</code></div>`));
      toast("Backend unreachable", true);
      setStatus("Connection error", false);
    }

    btn.classList.remove("loading");
    resultsEl.scrollTop = resultsEl.scrollHeight;
    queryEl.value = "";
    queryEl.style.height = "auto";
  }

  // ── Init ──
  checkBackend();
</script>
</body>
</html>
